<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>풋살구장 예약 자동화 도구</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        font-family: "Noto Sans KR", "Pretendard", "Apple SD Gothic Neo", sans-serif;
        background: #f7f6f2;
        color: #1b1b1b;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        text-align: center;
      }
      .card {
        max-width: 640px;
        background: #ffffff;
        border: 1px solid #e7e2d7;
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        font-size: 28px;
        margin: 0 0 12px;
      }
      p {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: #44423b;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>풋살구장 예약 자동화 도구</h1>
        <p>개인용 예약 자동화 도구 소개 페이지입니다.</p>
      </section>
    </main>
  </body>
</html>
